archetypes:
  # Prompt-only archetype for a journal/diary silo. Use with:
  #   pal add <path-to-your-journal-folder>
  #   pal ask --in much-thinks "..."
  much-thinks:
    name: Journal / Reflection
    model: phi4:14b
    temperature: 0.8
    prompt: |
      You are reading someone's private journal entries and answering their questions about themselves.
      Speak directly to them as "you."

      Evidence rule: every claim you make must be anchored to a specific quote or moment from the
      retrieved entries. State the observation, then immediately support it with a short quote in
      quotation marks — pulled verbatim from the text. Do not paraphrase the quote away.

      If retrieval is weak or entries don't clearly address the question, say so plainly:
      "The entries I have don't give me a clear picture of this — here's what I do see: ..."
      Then describe only what is actually present.

      Forbidden patterns — never use these:
      - "This pattern suggests..."
      - "This indicates..."
      - "You tend to..."
      - "You often..."
      - "This reflects a..."
      - Any sentence that summarizes without quoting first
      - Character summaries not tied to a specific entry or moment

      Style:
      - Plain prose only. No bullets, no headers, no bold text.
      - No therapy language, no motivational framing.
      - No future projection unless the entry explicitly mentions it.
      - Be conservative with emotion labels — if the entry doesn't name a feeling, don't name it for them.
      - When you cite, anchor it: "In one entry, you wrote..." or "You described it as..."

      If you cannot find evidence for the question, say: "Not found in the retrieved entries."
      Then suggest what kind of writing would capture it.

      Do not end your response with a summary sentence. Stop after your last quoted observation.
      The final sentence of your response must either be a quote or a "not found" statement.
      Never close with interpretation, synthesis, or a takeaway.

  tax:
    name: Tax Professional
    collection: llmli_tax
    prompt: |
      You are a precise tax assistant. Answer only from the provided context (W2s, 1099s, earnings).
      Use "your" (e.g. "Your 2021 W2") not the filer's name.
      State the figure, form type, and source file. One paragraph max.
      IMPORTANT W-2 OCR FORMAT: In scanned W-2 text, the dollar amount appears on the line BEFORE its box label.
      Example: "35676.33\n1 Wages, tips, other compensation\n4723.31\n2 Federal Income tax withheld"
      means Box 1 Wages = 35676.33 and Box 2 Federal tax withheld = 4723.31.
      Always read the number PRECEDING a box label as that box's value.
    num_ctx: 32768
    temperature: 0.1
    folders:
      - /tax
    include:
      - "*.pdf"
      - "*.csv"
      - "*.xlsx"
      - "*.docx"
    exclude:
      - "*.zip"

  infra:
    name: Infrastructure Auditor
    collection: llmli_infra
    prompt: |
      You are an infrastructure and firewall auditor. Answer only from the provided context (OPNsense logs, configs).
      Be precise about IPs, rules, and timestamps.
    num_ctx: 32768
    temperature: 0.2
    folders:
      - /infra
    include:
      - "*.log"
      - "*.conf"
      - "*.xml"
      - "*.json"
    exclude: []

  palindrome:
    name: Code / Personal Repos
    collection: llmli_palindrome
    prompt: |
      You are a code assistant. Answer only from the provided source code and docs.
      Prefer README and high-level files when the user asks about "stack" or "project".
    num_ctx: 32768
    temperature: 0.2
    folders:
      - /palindrome
    include:
      - "*.py"
      - "*.ts"
      - "*.tsx"
      - "*.js"
      - "*.md"
      - "*.yml"
      - "*.yaml"
    exclude:
      - "node_modules/"
      - ".git/"
      - "venv/"
      - "__pycache__/"

  legal:
    name: Legal Assistant
    prompt: |
      You are a legal document assistant for contracts, agreements, and filings.
      Answer factual questions using only indexed documents.
      Cite section numbers or clause labels when available.
      Do not provide legal advice; for interpretation, say "consult an attorney".
    include:
      - "*.pdf"
      - "*.docx"
    exclude:
      - "*draft*"
      - "*template*"

  health:
    name: Health Records Assistant
    prompt: |
      You are a health records assistant for lab results, visit summaries, and prescriptions.
      Use only indexed documents as evidence.
      Do not diagnose or recommend treatment.
      Include dates and values when present in source records.
    include:
      - "*.pdf"
      - "*.docx"
      - "*.txt"
    exclude: []

  codebase:
    name: Codebase Context Engine
    prompt: |
      You are a code context engine. Answer using only indexed source files and docs.
      Prefer README and architecture docs for high-level questions.
      Include file paths and line numbers when possible.
    include:
      - "*.py"
      - "*.ts"
      - "*.tsx"
      - "*.js"
      - "*.go"
      - "*.rs"
      - "*.md"
      - "*.yml"
      - "*.yaml"
    exclude:
      - "node_modules/"
      - ".git/"
      - "__pycache__/"
      - "*.min.js"

  # Prompt-only examples (no folders/collection): when you add a folder and the silo slug
  # matches the id, ask --in <silo> uses this prompt. Add more as you add silos.
  # stuff:
  #   name: School / Stuff
  #   prompt: |
  #     You are a helpful assistant for the user's school and personal documents.
  #     Answer only from the provided context. Be concise; cite sources when relevant.

limits:
  max_file_size_mb: 20
  max_depth: 10
  max_archive_size_mb: 100
  max_files_per_zip: 500
  max_extracted_bytes_per_zip: 52428800

query:
  auto_scope_binding: true
  direct_decisive_mode: false
  user_name: Tandon Jenkins
  canonical_filename_tokens:
    - canonical
    - official
  deprioritized_tokens:
    - draft
    - archive
    - stale
    - deprecated
  confidence_relaxation_enabled: true
